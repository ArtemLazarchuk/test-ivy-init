apiVersion: ivy-deploy/v1
serviceName: test-ivy-init
title: TestIvyInit
githubRepo: ArtemLazarchuk/test-ivy-init
branch: main
dockerfilePath: Dockerfile
port: 80
healthCheck:
  path: /health
  intervalSeconds: 30
  timeoutSeconds: 5
  startPeriodSeconds: 10
env:
- name: ConnectionStrings:TestIvyInit
  value: Data Source=/app/data/test-ivy-init.db
volumes:
- volumeName: '{serviceName}-test-ivy-init'
  description: Persistent storage for the TestIvyInit SQLite database.
  mountPath: /app/data
  size: 1Gi
childServices: []
deployRules:
  autoDeploy: true
  ignorePaths:
  - docs/*
  - '*.md'
  - ivy-deploy.yaml
