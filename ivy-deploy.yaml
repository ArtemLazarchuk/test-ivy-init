apiVersion: ivy-deploy/v1
serviceName: test-ivy-init
title: "TestIvyInit"
githubRepo: ArtemLazarchuk/test-ivy-init
branch: main
dockerfilePath: Dockerfile

port: 80

healthCheck:
  path: /health
  intervalSeconds: 30
  timeoutSeconds: 5
  startPeriodSeconds: 10

deployRules:
  autoDeploy: true
  ignorePaths:
    - "docs/*"
    - "*.md"
    - "ivy-deploy.yaml"
