apiVersion: ivy-deploy/v1
serviceName: test-ivy-init
title: TestIvyInit
githubRepo: ArtemLazarchuk/test-ivy-init
branch: main
dockerfilePath: Dockerfile
port: 80
healthCheck:
  path: /health
  intervalSeconds: 30
  timeoutSeconds: 5
  startPeriodSeconds: 10
env:
  - name: ConnectionStrings:TestIvyInit
    value: Host={{parentServiceName}-test-ivy-init:host};Port=5432;Database={{parentServiceName}-test-ivy-init:env:POSTGRES_DB};Username={{parentServiceName}-test-ivy-init:env:POSTGRES_USER};Password={{parentServiceName}-test-ivy-init:env:POSTGRES_PASSWORD};SSL Mode=Disable
    secret: true
volumes: []
childServices:
  - serviceName: "{parentServiceName}-test-ivy-init"
    imageUrl: postgres:16
    description: PostgreSQL database for the TestIvyInit connection.
    env:
      - name: POSTGRES_USER
        default: postgres
      - name: POSTGRES_PASSWORD
        secret: true
        generate: random:24
      - name: POSTGRES_DB
        default: "{parentServiceName}"
    volumes:
      - volumeName: "{parentServiceName}-test-ivy-init-data"
        mountPath: /var/lib/postgresql/data
        size: 5Gi
deployRules:
  autoDeploy: true
  ignorePaths:
    - docs/*
    - "*.md"
    - ivy-deploy.yaml
